services:
  cafe:
    build: .
    image: crossroads-agent-cafe:latest
    container_name: crossroads-cafe
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      ENVIRONMENT: production
      AUTH_COOKIE_SECURE: "true"
      REGISTRATION_BONUS_CNY: "0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
