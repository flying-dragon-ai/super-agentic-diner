# ============================================================================
# Coffee AI Boss — 1Panel 面板部署编排（仅 app 容器）
# ============================================================================
# MySQL / Redis 假定已由 1Panel 应用商店或宿主机提供，本编排不重复起 db。
#
# 启动（SSH，在项目根目录执行）：
#   docker compose -f deploy/docker-compose.1panel.yml up -d --build
#
# 启动后 app 容器会出现在 1Panel「容器」列表，可用面板查看日志 / 重启 / 删除。
# 反向代理 + SSL 在 1Panel「网站」配置（见 DEPLOY-1PANEL.md 第 5、6、7 步）。
# ============================================================================

services:
  coffee-ai-boss:
    build:
      context: ..
      dockerfile: Dockerfile
    image: coffee-ai-boss:latest
    container_name: coffee-ai-boss
    restart: unless-stopped

    # 只绑 127.0.0.1：外部访问经 1Panel 网站(OpenResty)反向代理，不直接暴露到公网
    ports:
      - "127.0.0.1:8000:8000"

    # 项目根目录的 .env（MYSQL_/REDIS_/LLM_/EVOMAP_/AUTH_* 等）
    env_file:
      - ../.env

    # 让容器能用 host.docker.internal 连宿主机的 MySQL / Redis
    # （.env 里设 MYSQL_HOST=host.docker.local、REDIS_HOST=host.docker.local）
    extra_hosts:
      - "host.docker.local:host-gateway"

    # 覆盖 Dockerfile 的 CMD：启动前先跑幂等 schema 迁移，再前台起 uvicorn
    command: >
      sh -c "python scripts/init_db.py &&
             python scripts/migrate_order_sources.py &&
             exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
