services:
  crossroads-agent-cafe:
    build:
      context: ..
      dockerfile: Dockerfile
    image: crossroads-agent-cafe:latest
    container_name: crossroads-agent-cafe
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      AUTH_COOKIE_SECURE: "true"
      REGISTRATION_BONUS_CNY: "0"
    extra_hosts:
      - "host.docker.local:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
