<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crossroads Agent Café</title>
<!-- 性能优化：DNS预解析 + 资源预连接 -->
<link rel="dns-prefetch" href="//127.0.0.1:8000">
<link rel="preconnect" href="//127.0.0.1:8000" crossorigin>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #f5f0e8;
    color: #3d2f24;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: linear-gradient(135deg, #c9a27e, #b08968);
    padding: 14px 24px;
    box-shadow: 0 2px 10px rgba(0,0,0,.1);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header h1 span { margin-right: 8px; }
  #modeTag {
    font-size: 12px; padding: 4px 10px; border-radius: 12px;
    background: rgba(0,0,0,.08);
  }
  #modeTag.llm { background: #4caf50; }
  #modeTag.mock { background: #ff9800; }
  /* 右上角状态栏(按钮 + LLM(大模型) 标签)成组靠右 */
  #headRight {
    display: flex; gap: 10px; align-items: center;
  }
  /* 跳转 3D 咖啡厅的按钮 */
  #view3dBtn {
    font-size: 12px; padding: 5px 12px; border-radius: 12px; cursor: pointer;
    background: #c08552; color: #fff; border: 1px solid #b87545;
    font-weight: 600; transition: background .15s;
  }
  #view3dBtn:hover { background: #b87545; }

  main {
    flex: 1; display: flex; overflow: hidden;
  }
  /* 聊天区 */
  #chat {
    flex: 1; display: flex; flex-direction: column; min-width: 0;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
  }
  .msg {
    max-width: 75%; margin-bottom: 14px; padding: 12px 16px;
    border-radius: 16px; line-height: 1.6; white-space: pre-wrap;
    word-break: break-word; animation: fade .25s ease;
  }
  @keyframes fade { from{opacity:0; transform: translateY(8px);} to{opacity:1;} }
  .msg.bot {
    background: #ede4d6; align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    background: #c08552; color: #fff; align-self: flex-end; margin-left: auto;
    border-bottom-right-radius: 4px;
  }
  .msg.sys { background: rgba(255,152,0,.12); border:1px solid #ff9800; font-size:13px; }

  #quick {
    display: flex; gap: 8px; padding: 8px 20px; flex-wrap: wrap; flex-shrink: 0;
    align-items: center;
  }
  #quickMenu {
    display: flex; gap: 8px; flex-wrap: wrap; min-width: 0;
  }
  #quick button {
    background: #e8dfd3; color: #5a4a3a; border: 1px solid #d0c0b0;
    padding: 6px 12px; border-radius: 16px; font-size: 12px; cursor: pointer;
    transition: all .15s;
    min-height: 30px;
    max-width: 150px;
    overflow-wrap: anywhere;
  }
  #quick button.intent-active {
    background: #d0c0b0; border-color: #c08552; color: #3d2f24;
  }
  #quick .quick-clear {
    margin-left: auto;
    flex: 0 0 auto;
  }
  #quick button:hover { background: #d8c8b8; }

  #inputBar {
    display: flex; gap: 10px; padding: 16px 20px; background: #ebe5dd; flex-shrink: 0;
  }
  #consumerUrlBar {
    display: flex; gap: 10px; padding: 10px 20px 0; background: #ebe5dd; flex-shrink: 0;
  }
  #consumerUrlInput {
    flex: 1; background: #fff; color: #5a4a3a; border: 1px solid #d0c0b0;
    border-radius: 10px; padding: 9px 12px; font-size: 12px; outline: none;
  }
  #consumerUrlInput:focus { border-color: #c08552; }
  #msgInput {
    flex: 1; background: #fff; color: #3d2f24; border: 1px solid #d0c0b0;
    border-radius: 12px; padding: 12px 16px; font-size: 14px; outline: none;
  }
  #msgInput:focus { border-color: #c08552; }
  #sendBtn {
    background: #c08552; color: #fff; border: none; border-radius: 12px;
    padding: 0 24px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background .15s;
  }
  #sendBtn:hover { background: #b87545; }
  #sendBtn:disabled { opacity: .5; cursor: not-allowed; }

  /* 侧栏 */
  #side {
    width: min(46vw, 520px); min-width: 420px; background: #ebe5dd; padding: 20px; overflow-y: auto;
    border-left: 1px solid #d8ccc0; flex-shrink: 0;
  }
  #side h3 {
    font-size: 13px; color: #a06b3e; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid #d8ccc0;
  }
  .card {
    background: #f5f0e8; border-radius: 12px; padding: 14px; margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .card .row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 14px; }
  .card .row .val { color: #5a4a3a; font-weight: 600; }
  .card .big { font-size: 26px; color: #b87545; font-weight: 700; margin: 8px 0; }
  .order-item {
    background: #f0e8dc; border-radius: 8px; padding: 8px 10px; margin: 6px 0;
    font-size: 13px;
  }
  .order-item .name { color: #5a4a3a; }
  .order-item .meta { color: #8a7a6a; font-size: 11px; }
  #emptyTip { color: #a0918a; font-size: 13px; text-align: center; padding: 16px 0; }

  /* ===== 响应式：三档断点（桌面 / 平板 / 手机）===== */
  /* 手机侧栏切换按钮 + 遮罩层（桌面隐藏，仅手机显示）*/
  #sideToggle {
    display: none;
    font-size: 12px; padding: 5px 12px; border-radius: 12px; cursor: pointer;
    background: #e8dfd3; color: #5a4a3a; border: 1px solid #d0c0b0;
    font-weight: 600; transition: background .15s;
  }
  #sideToggle:hover { background: #d8c8b8; }
  #sideOverlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.3); z-index: 99;
  }
  #sideOverlay.show { display: block; }

  /* ----- 平板（768-1023px）：侧栏缩窄，Agent 灯隐藏文字 ----- */
  @media (max-width: 1023px) {
    #side {
      width: 300px;
      min-width: 300px;
    }
    /* Agent 灯缩小间距（竖排结构保持不变） */
    #agentStatus {
      gap: 12px;
    }
    .agent-lamp .label {
      font-size: 9px;
    }
    .agent-lamp .icon {
      font-size: 12px;
    }
    header h1 {
      font-size: 18px;
    }
  }

  /* ----- 手机（<768px）：侧栏抽屉式 + header 两行 + 卡片自适应 ----- */
  @media (max-width: 767px) {
    /* header 两行布局 */
    header {
      flex-wrap: wrap;
      padding: 10px 12px;
      gap: 8px;
    }
    header h1 {
      font-size: 16px;
      flex: 1;
      min-width: 0;
    }
    /* Agent 灯紧凑横排 */
    /* Agent 灯紧凑横排居中 */
    #agentStatus {
      gap: 14px;
      order: 3;
      width: 100%;
      padding: 0;
      justify-content: center;
    }
    .agent-lamp .label {
      font-size: 9px;
    }
    .agent-lamp .icon {
      font-size: 12px;
    }
    /* 右侧按钮区紧凑 */
    #headRight {
      gap: 6px;
    }
    #view3dBtn, #logoutBtn {
      font-size: 11px;
      padding: 4px 8px;
    }
    /* 手机侧栏切换按钮显示 */
    #sideToggle {
      display: block;
    }
    /* 聊天区占满 */
    #chat {
      flex: 1;
    }
    #messages {
      padding: 12px;
    }
    .msg {
      max-width: 90%;
    }
    /* 输入区紧凑 */
    #inputBar {
      padding: 10px 12px;
      gap: 8px;
    }
    #msgInput {
      padding: 10px 12px;
      font-size: 13px;
    }
    #sendBtn {
      padding: 0 16px;
      font-size: 13px;
    }
    /* 快捷菜单按钮自适应 */
    #quick {
      padding: 6px 12px;
    }
    #quick button {
      max-width: none;
      font-size: 11px;
      padding: 5px 10px;
    }
    /* 菜单卡片窄一点 */
    .menu-card {
      flex: 0 0 140px;
    }
    .menu-card img {
      height: 100px;
    }
    /* 侧栏抽屉式：默认隐藏在右侧外，点击滑入 */
    #side {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 85vw;
      min-width: 0;
      z-index: 100;
      transform: translateX(100%);
      transition: transform .25s ease;
      border-left: 1px solid #d8ccc0;
      border-top: none;
      padding: 16px;
    }
    #side.side-open {
      transform: translateX(0);
    }
  }

  /* ===== 暗色模式（跟随系统 prefers-color-scheme: dark）===== */
  @media (prefers-color-scheme: dark) {
    body {
      background: #2b2118;
      color: #f5ebe0;
    }
    header {
      background: linear-gradient(135deg, #6f4e37, #4a3429);
      box-shadow: 0 2px 10px rgba(0,0,0,.4);
    }
    #modeTag {
      background: rgba(255,255,255,.15);
    }
    #logoutBtn {
      background: #4a3429 !important;
      color: #e8d5b7 !important;
      border-color: #6f4e37 !important;
    }
    #sideToggle {
      background: #4a3429;
      color: #e8d5b7;
      border-color: #6f4e37;
    }
    #sideToggle:hover { background: #6f4e37; }
    #sideOverlay {
      background: rgba(0,0,0,.5);
    }
    /* Bot 气泡 */
    .msg.bot {
      background: #3d2f24;
    }
    /* User 气泡 */
    .msg.user {
      color: #1a120b;
    }
    /* 快捷按钮 */
    #quick button {
      background: #4a3429;
      color: #e8d5b7;
      border-color: #6f4e37;
    }
    #quick button.intent-active {
      background: #6f4e37;
      border-color: #c08552;
      color: #fff3df;
    }
    #quick button:hover { background: #6f4e37; }
    /* 输入区 */
    #inputBar {
      background: #221a13;
    }
    #consumerUrlBar {
      background: #221a13;
    }
    #consumerUrlInput {
      background: #2d231b;
      color: #e8d5b7;
      border-color: #4a3429;
    }
    #msgInput {
      background: #3d2f24;
      color: #f5ebe0;
      border-color: #6f4e37;
    }
    #sendBtn {
      color: #1a120b;
    }
    #sendBtn:hover { background: #d49a66; }
    /* 侧栏 */
    #side {
      background: #221a13;
      border-left-color: #3d2f24;
    }
    #side h3 {
      color: #c08552;
      border-bottom-color: #3d2f24;
    }
    .card {
      background: #3d2f24;
      box-shadow: none;
    }
    .card .row .val {
      color: #e8d5b7;
    }
    .card .big {
      color: #d49a66;
    }
    .order-item {
      background: #4a3429;
    }
    .order-item .name {
      color: #e8d5b7;
    }
    #emptyTip {
      color: #6a5a4a;
    }
    /* 菜单卡片 */
    .menu-cards::-webkit-scrollbar-thumb { background: #6f4e37; }
    .menu-card {
      background: linear-gradient(135deg, #4a3429, #3d2f24);
      border-color: rgba(192,133,82,.25);
      box-shadow: none;
    }
    .menu-card img {
      background: #2b2118;
    }
    .menu-card-name {
      color: #f5ebe0;
    }
    .menu-card-price {
      color: #d49a66;
    }
    .menu-card-tags {
      color: #8a7a6a;
    }
    .menu-card-btn {
      color: #1a120b;
    }
    .menu-card-btn:hover { background: #d49a66; }
    /* 确认按钮 */
    .confirm-actions button {
      color: #1a120b;
    }
    .confirm-actions button:hover { background: #d49a66; }
    /* 滚动条 */
    ::-webkit-scrollbar-thumb { background: #4a3429; }
    .typing { color: #8a7a6a; }
    /* Agent 灯 */
    .agent-lamp {
      color: #6a5a4a;
    }
    .agent-lamp .dot {
      background: #4a3429;
    }
    .agent-lamp.active {
      color: #f5ebe0;
    }
    /* 手机侧栏抽屉 */
    #side {
      border-left-color: #3d2f24;
    }
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #d0c0b0; border-radius: 3px; }
  .typing { color: #8a7a6a; font-style: italic; }

  /* 菜单图片卡片（水平滚动） */
  .menu-cards {
    display: flex; gap: 14px; overflow-x: auto; padding: 12px 4px;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  }
  .menu-cards::-webkit-scrollbar { height: 5px; }
  .menu-cards::-webkit-scrollbar-thumb { background: #c0b0a0; border-radius: 3px; }
  .menu-card {
    flex: 0 0 160px; scroll-snap-align: start;
    background: linear-gradient(135deg, #f5f0e8, #ede4d6);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    border: 1px solid rgba(192,133,82,.3);
    transition: transform .18s, border-color .18s;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .menu-card:hover {
    transform: translateY(-4px);
    border-color: #c08552;
  }
  .menu-card img {
    width: 100%; height: 120px; object-fit: cover;
    display: block; background: #f0e6d8;
  }
  .menu-card-body {
    padding: 10px 12px 12px;
  }
  .menu-card-name {
    font-size: 14px; font-weight: 600; color: #3d2f24;
    margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .menu-card-price {
    font-size: 16px; font-weight: 700; color: #b87545;
  }
  .menu-card-price::before { content: '¥'; font-size: 12px; margin-right: 1px; }
  .menu-card-tags {
    font-size: 11px; color: #9a8a7a; margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .menu-card-btn {
    display: block; width: 100%; margin-top: 8px;
    padding: 6px 0; border-radius: 8px; border: none;
    background: #c08552; color: #fff; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .menu-card-btn:hover { background: #b87545; }

  /* 待确认订单的操作按钮（确认 / 下单） */
  .confirm-actions {
    margin-top: 12px;
    display: flex;
    gap: 10px;
  }
  .confirm-actions button {
    padding: 8px 22px;
    border-radius: 10px;
    border: none;
    background: #c08552;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .confirm-actions button:hover { background: #b87545; }

  /* ===== Agent 运行指示灯（竖排：名字在上，圆点在下）===== */
  #agentStatus {
    display: flex;
    gap: 18px;
    align-items: flex-end;
    justify-content: center;
    flex: 1;
    padding: 0 12px;
    flex-shrink: 0;
  }
  .agent-lamp {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: #3d2f24;
    transition: color .3s;
    white-space: nowrap;
    line-height: 1.2;
  }
  .agent-lamp .label {
    font-size: 10px;
    opacity: 0.85;
  }
  .agent-lamp .icon {
    font-size: 14px;
    line-height: 1;
  }
  .agent-lamp .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #c0b8b0;
    transition: all .3s;
    flex-shrink: 0;
  }
  .agent-lamp.active {
    color: #1a120b;
  }
  .agent-lamp.active .label {
    opacity: 1;
    font-weight: 600;
  }
  .agent-lamp.active .dot {
    background: #4caf50;
    box-shadow: 0 0 10px #4caf50, 0 0 4px #4caf50;
    animation: lamp-pulse 1s ease-in-out infinite;
  }
  @keyframes lamp-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }
  /* ===== 饮品分类导航栏 ===== */
  #menuTabs {
    display: flex;
    gap: 0;
    padding: 0 4px 8px;
    border-bottom: 1px solid rgba(192,133,82,.2);
    margin-bottom: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  #menuTabs::-webkit-scrollbar { display: none; }
  .menu-tab {
    flex: 0 0 auto;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: #8a7a6a;
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    white-space: nowrap;
    border-radius: 0;
  }
  .menu-tab:hover { color: #5a4a3a; }
  .menu-tab.active {
    color: #b87545;
    border-bottom-color: #c08552;
    font-weight: 700;
  }
  .menu-tab .tab-badge {
    display: inline-block;
    margin-left: 3px;
    font-size: 10px;
    padding: 0 5px;
    border-radius: 8px;
    background: rgba(192,133,82,.15);
    color: #8a7a6a;
    min-width: 16px;
    text-align: center;
  }
  .menu-tab.active .tab-badge {
    background: rgba(192,133,82,.3);
    color: #b87545;
  }
</style>
</head>
<body>
<header>
  <h1><span>☕</span>Crossroads Agent Café</h1>
  <!-- Agent 运行指示灯：用到哪个亮哪个，WebSocket 实时驱动 -->
  <div id="agentStatus">
    <div class="agent-lamp" id="lamp-manager"><span class="label">店长🧠</span><span class="dot"></span></div>
    <div class="agent-lamp" id="lamp-recommender"><span class="label">推荐🎯</span><span class="dot"></span></div>
    <div class="agent-lamp" id="lamp-reviewer"><span class="label">复盘🔍</span><span class="dot"></span></div>
    <div class="agent-lamp" id="lamp-experience"><span class="label">经验📚</span><span class="dot"></span></div>
  </div>
  <div id="headRight">
    <!-- 点击新开标签页打开 3D 咖啡厅场景(/3d) -->
    <button id="view3dBtn" onclick="window.open('/3d','_blank')">🌐 3D 咖啡厅</button>
    <!-- 登出后回到登录页 -->
    <button id="logoutBtn" onclick="doLogout()" style="font-size:12px;padding:5px 12px;border-radius:12px;cursor:pointer;background:#e8dfd3;color:#5a4a3a;border:1px solid #d0c0b0;font-weight:600;transition:background .15s;">🚪 登出</button>
    <!-- 手机侧栏切换按钮（桌面隐藏，仅手机显示） -->
    <button id="sideToggle" onclick="toggleSide()">📋 信息</button>
    <span id="modeTag">加载中…</span>
  </div>
</header>
<!-- 手机侧栏遮罩层 -->
<div id="sideOverlay" onclick="toggleSide()"></div>
<main>
  <div id="chat">
    <div id="messages"></div>
    <div id="quick">
      <div id="quickMenu" aria-label="意图快捷菜单"></div>
      <button class="quick-clear" onclick="clearChat()">🗑 清空对话</button>
    </div>
    <div id="inputBar">
      <input id="msgInput" placeholder="和店长说点什么…" onkeydown="if(event.key==='Enter')send()" />
      <button id="sendBtn" onclick="send()">发送</button>
    </div>
  </div>
  <aside id="side">
    <h3>👤 用户信息</h3>
    <div class="card" id="userCard">
      <div id="userName">加载中…</div>
      <div class="big" id="userBalance">¥--</div>
      <div class="row"><span>口味偏好</span><span class="val" id="userPref">--</span></div>
    </div>
    <h3>🧾 最近订单</h3>
    <div id="orderList"><div id="emptyTip">还没有订单，聊起来吧~</div></div>
  </aside>
</main>

<script>
// USER_ID 由 /auth/me 动态获取，未登录时为 null（页面显示登录引导）
let USER_ID = null;
const $ = id => document.getElementById(id);
const quickState = {
  lastUserText: '',
  lastBotText: '',
  selectedKey: '',
  scene: 'welcome',
};

const quickPresets = {
  welcome: [

function containsAny(text, words) {
  return words.some(word => text.includes(word));
}

function normalizeText(text) {
  return String(text || '').toLowerCase();
}

function extractCoffeeName(text) {
  const source = String(text || '');
  const quoted = source.match(/[「『]([^」』]{2,16})[」』]/);
  if (quoted) return quoted[1].replace(/[，。,.].*$/, '').slice(0, 8);
  const named = source.match(/([\u4e00-\u9fa5]{2,8}(拿铁|冷萃|美式|摩卡|咖啡|澳白|卡布))/);
  return named ? named[1].slice(0, 8) : '';
}

function inferQuickScene(userText, botText, stage) {
  const user = normalizeText(userText);
  const bot = normalizeText(botText);
  const joined = user + ' ' + bot;
  if (stage === 'issue') return 'issue';
  if (stage === 'sending') return 'waiting';
  if (containsAny(bot, ['已生成订单', '已为您下单', '扣款', '订单 #', '订单#'])) return 'paid';
  if (containsAny(bot, ['确认下单', '回复「确认」', '回复“确认”', '待确认'])) return 'confirming';
  if (containsAny(user, ['确认', '下单', '买', '扣钱', '扣款', '结账', '支付'])) return 'ordering';
  if (containsAny(joined, ['椰子', '椰香', '椰'])) return 'coconut';
  if (containsAny(joined, ['果味', '水果', '果香', '清甜', '酸甜', '不要牛奶', '无奶'])) return 'fruit';
  if (containsAny(joined, ['苦', '黑咖啡', '深烘', '美式', '不要拿铁', '纯粹'])) return 'bitter';
  if (containsAny(joined, ['推荐', '菜单', '喝点', '口味', '忌口', '适合'])) return 'welcome';
  return quickState.scene || 'welcome';
}

function tuneActionsForContext(actions, userText, botText) {
  const coffeeName = extractCoffeeName(botText);
  const user = normalizeText(userText);
  const tuned = actions.map(action => ({...action}));
  if (coffeeName) {
    const labelName = coffeeName.length > 5 ? coffeeName.slice(0, 5) : coffeeName;
    const orderIndex = tuned.findIndex(action => action.key === 'order-reco' || action.key === 'confirm');
    if (orderIndex >= 0) {
      tuned[orderIndex] = {
        ...tuned[orderIndex],
        label: '✅ 买' + labelName,
        prompt: '就买「' + coffeeName + '」，从我余额里扣钱吧。',
      };
    }
  }
  if (containsAny(user, ['冰', '冷'])) {
    tuned[1] = {key: 'ice-focus', label: '🧊 冰饮优先', prompt: '优先推荐冰饮，口感清爽一点。'};
  } else if (containsAny(user, ['热', '暖'])) {
    tuned[1] = {key: 'hot-focus', label: '♨️ 热饮优先', prompt: '优先推荐热饮，适合慢慢喝。'};
  }
  if (containsAny(user, ['不要牛奶', '无奶', '不加奶'])) {
    tuned[0] = {key: 'milkless', label: '无奶', prompt: '请按不加牛奶的方向推荐。'};
  }
  return tuned.slice(0, 4);
}

function renderQuickMenu(options) {
  const opts = options || {};
  if (opts.userText !== undefined) quickState.lastUserText = opts.userText;
  if (opts.botText !== undefined) quickState.lastBotText = opts.botText;
  const scene = opts.scene || inferQuickScene(quickState.lastUserText, quickState.lastBotText, opts.stage);
  quickState.scene = scene;
  const menu = $('quickMenu');
  if (!menu) return;
  const base = quickPresets[scene] || quickPresets.welcome;
  const actions = tuneActionsForContext(base, quickState.lastUserText, quickState.lastBotText);
  menu.replaceChildren();
  actions.forEach(action => {
    const button = document.createElement('button');
    button.type = 'button';
    button.textContent = action.label;
    button.title = action.prompt;
    button.dataset.intent = action.key;
    if (action.key === quickState.selectedKey) button.classList.add('intent-active');
    button.addEventListener('click', () => {
      quickState.selectedKey = action.key;
      fill(action.prompt);
    });
    menu.appendChild(button);
  });
}

function addMsg(text, role) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  $('messages').appendChild(el);

  return el;
}

// ===== 菜单图片卡片 + 分类筛选 =====
let _menuCache = null;
let _menuFilter = 'all'; // all, hot, cold, special, coffee

function asDisplayText(value, fallback = '') {
  if (value === null || value === undefined) return fallback;
  const text = String(value);
  return text || fallback;
}

function formatMenuPrice(value) {
  const price = Number(value);
  return Number.isFinite(price) ? price.toFixed(2) : '—';
}

function safeMenuImageUrl(value) {
  if (typeof value !== 'string' || !value.trim()) return '';
  try {
    const url = new URL(value, window.location.origin);
    if (
      url.origin !== window.location.origin ||
      !url.pathname.startsWith('/images/') ||
      !url.pathname.toLowerCase().endsWith('.png')
    ) return '';
    return url.pathname + url.search;
  } catch (_) {
    return '';
  }
}

function createMenuCard(item) {
  const product = item && typeof item === 'object' ? item : {};
  const name = asDisplayText(product.name, '未命名饮品');
  const card = document.createElement('div');
  card.className = 'menu-card';

  const imageUrl = safeMenuImageUrl(product.image);
  if (imageUrl) {
    const image = document.createElement('img');
    image.src = imageUrl;
    image.alt = name;
    image.loading = 'lazy';
    image.addEventListener('error', () => image.remove(), { once: true });
    card.appendChild(image);
  }

  const body = document.createElement('div');
  body.className = 'menu-card-body';
  const nameElement = document.createElement('div');
  nameElement.className = 'menu-card-name';
  nameElement.textContent = name;
  body.appendChild(nameElement);

  const priceElement = document.createElement('div');
  priceElement.className = 'menu-card-price';
  priceElement.textContent = formatMenuPrice(product.price);
  body.appendChild(priceElement);

  const tagsElement = document.createElement('div');
  tagsElement.className = 'menu-card-tags';
  tagsElement.textContent = asDisplayText(product.tags).split(',').slice(0, 3).join(' ');
  body.appendChild(tagsElement);

  const orderButton = document.createElement('button');
  orderButton.type = 'button';
  orderButton.className = 'menu-card-btn';
  orderButton.textContent = '点这杯';
  orderButton.setAttribute('aria-label', `点一杯${name}`);
  orderButton.addEventListener('click', () => orderCoffee(name));
  body.appendChild(orderButton);
  card.appendChild(body);
  return card;
}

async function fetchMenu() {
  if (_menuCache) return _menuCache;
  try {
    const r = await fetch('/menu', {credentials: 'include'});
    if (!r.ok) return [];
    const data = await r.json();
    _menuCache = Array.isArray(data) ? data : [];
    return _menuCache;
  } catch(e) { return []; }
}

// 根据分类筛选菜单项
function filterMenuByCategory(items, filter) {
  if (filter === 'all') return items;
  if (filter === 'coffee') return items.filter(i => i.category === '咖啡' || (!i.category && !['热饮','冷饮','特调'].includes(i.category)));
  if (filter === 'hot') return items.filter(i => i.category === '热饮' || (i.tags && i.tags.includes('热饮')));
  if (filter === 'cold') return items.filter(i => i.category === '冷饮' || i.category === '冷萃' || (i.tags && (i.tags.includes('冷饮') || i.tags.includes('冷萃'))));
  if (filter === 'special') return items.filter(i => i.category === '特调' || (i.tags && i.tags.includes('特调')));
  return items;
}

// 渲染分类导航栏
function renderMenuTabs(container, totalCount, items) {
  const counts = {
    all: totalCount,
    hot: filterMenuByCategory(items, 'hot').length,
    cold: filterMenuByCategory(items, 'cold').length,
    special: filterMenuByCategory(items, 'special').length,
    coffee: filterMenuByCategory(items, 'coffee').length,
  };
  const tabs = [
    {key:'all', label:'☕ 全部'},
    {key:'hot', label:'♨️ 热饮'},
    {key:'cold', label:'🧊 冷饮'},
    {key:'coffee', label:'🌱 经典'},
    {key:'special', label:'✨ 特调'},
  ];
  const fragment = document.createDocumentFragment();
  for (const t of tabs) {
    const c = counts[t.key] || 0;
    if (c === 0 && t.key !== 'all') continue;
    const button = document.createElement('button');
    button.type = 'button';
    button.className = _menuFilter === t.key ? 'menu-tab active' : 'menu-tab';
    button.dataset.filter = t.key;
    button.appendChild(document.createTextNode(t.label));
    const badge = document.createElement('span');
    badge.className = 'tab-badge';
    badge.textContent = String(c);
    button.appendChild(badge);
    button.addEventListener('click', () => switchMenuTab(t.key));
    fragment.appendChild(button);
  }
  container.replaceChildren(fragment);
}

// 切换分类标签后重新渲染卡片
function switchMenuTab(filter) {
  _menuFilter = filter;
  const cardsContainer = document.getElementById('_menuCardsContainer');
  if (!cardsContainer || !_menuCache) return;
  const filtered = filterMenuByCategory(_menuCache, filter);
  rebuildMenuCards(cardsContainer, filtered);
}

// 重建菜单卡片区域（保留 Tab 栏不重建）
function rebuildMenuCards(wrapper, menuItems) {
  // 移除旧卡片区域（保留 Tab 栏）
  const oldCards = wrapper.querySelector('.menu-cards');
  if (oldCards) oldCards.remove();
  const cards = document.createElement('div');
  cards.className = 'menu-cards';
  const items = Array.isArray(menuItems) ? menuItems : [];
  if (items.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:20px;text-align:center;color:#a0918a;font-size:13px;';
    empty.textContent = '该分类暂无饮品';
    cards.appendChild(empty);
  } else {
    items.forEach(item => cards.appendChild(createMenuCard(item)));
  }
  wrapper.appendChild(cards);
}

// renderMenuCards: 渲染菜单卡片区域。
// options.fullMenu=true → 带分类 Tab 导航（用户主动浏览菜单时）
// options.fullMenu=false（默认）→ 纯卡片展示（LLM 推荐结果）
function renderMenuCards(menuItems, options) {
  var opts = options || {};
  var isFullMenu = !!opts.fullMenu;
  var items = Array.isArray(menuItems) ? menuItems : [];
  var wrapper = document.createElement('div');
  wrapper.className = 'msg bot';
  wrapper.style.cssText = 'max-width:100%;padding:4px 0;background:transparent;border:none;';
  // 非完整菜单模式（LLM 推荐）：只显示卡片，不显示分类 Tab
  if (!isFullMenu) {
    var title2 = document.createElement('div');
    title2.style.cssText = 'font-size:13px;color:#8a7a6a;margin-bottom:4px;padding-left:4px;';
    title2.textContent = '为您推荐，点击可直接下单：';
    wrapper.appendChild(title2);
    var cards2 = document.createElement('div');
    cards2.className = 'menu-cards';
    items.forEach(function(item) { cards2.appendChild(createMenuCard(item)); });
    wrapper.appendChild(cards2);
    $('messages').appendChild(wrapper);
    $('messages').scrollTop = $('messages').scrollHeight;
    return;
  }
  // 完整菜单模式：带分类 Tab 导航
  var title = document.createElement('div');
  title.style.cssText = 'font-size:13px;color:#8a7a6a;margin-bottom:4px;padding-left:4px;';
  title.textContent = '选择分类，浏览我们的全部饮品：';
  wrapper.appendChild(title);
  var tabsBar = document.createElement('div');
  tabsBar.id = 'menuTabs';
  tabsBar.className = 'menu-tabs';
  wrapper.appendChild(tabsBar);
  wrapper.id = '_menuCardsContainer';
  renderMenuTabs(tabsBar, items.length, items);
  // 初始渲染全部
  const filtered = filterMenuByCategory(items, _menuFilter);
  rebuildMenuCards(wrapper, filtered);
  $('messages').appendChild(wrapper);
  $('messages').scrollTop = $('messages').scrollHeight;
}

function isMenuRequest(text) {
  const t = (text || '').toLowerCase();
  const keywords = ['菜单', 'menu', '都有什么', '有什么', '都有什么咖啡',
                     '全部咖啡', '所有咖啡', '看看菜单', '今天有什么',
                     '列出', '看看有什么'];
  return keywords.some(k => t.includes(k));
}

function fill(text){
  $('msgInput').value = text;
  $('msgInput').focus();
  renderQuickMenu({userText: text});
}

// 卡片"点这杯"按钮：填充消息后自动发送下单请求
function orderCoffee(name) {
  fill('我要一杯' + name);
  send();
}

async function send() {
  if (USER_ID === null) { showLoginPrompt(); return; }
  const text = $('msgInput').value.trim();
  if (!text) return;
  $('msgInput').value = '';
  renderQuickMenu({userText: text, stage: 'sending'});
  addMsg(text, 'user');
  const typing = addMsg('店长正在思考…', 'bot');
  typing.classList.add('typing');
  // 进入思考态：用到的灯保持亮，结果返回后统一关闭
  _lampsThinking = true;
  // 立即点亮店长灯（请求已发出，店长 Agent 正在分析意图）
  _lightAgentLamp('agent.manager.intent');
  $('sendBtn').disabled = true;
  try {
    const consumerUrl = window.location.href;
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_id: USER_ID, message: text, consumer_url: consumerUrl})
    });
    // 先检查响应是否正常，再安全解析 JSON（防止 500 返回纯文本导致 JSON.parse 崩溃）
    if (!r.ok) {
      let errMsg = '请求失败 (' + r.status + ')';
      try {
        const errData = await r.json();
        errMsg = errData.detail || errData.message || errMsg;
      } catch(_) {}
      throw new Error(errMsg);
    }
    const data = await r.json();
    typing.classList.remove('typing');
    // 结果出来 → 退出思考态并关闭所有 Agent 灯
    _lampsThinking = false;
    _clearAllLamps();
    const menuRequest = isMenuRequest(text);
    const reply = typeof data.reply === 'string' ? data.reply : '';
    // 优先使用后端返回的结构化产品数据渲染卡片（推荐/菜单场景均覆盖）
    if (Array.isArray(data.products) && data.products.length > 0) {
      typing.textContent = '为您找到以下推荐，点击可直接下单：';
      renderMenuCards(data.products, {fullMenu: false});
    } else if (menuRequest) {
      // 兜底：后端未返回 products 时，前端自行拉取全量菜单
      typing.textContent = '以下是我们的全部咖啡，左右滑动浏览：';
      const menu = await fetchMenu();
      if (menu && menu.length) renderMenuCards(menu, {fullMenu: true});
    } else {
      // 待确认订单：截掉「确认下单请回复…」提示语，改为按钮
      if (reply.includes('确认下单请回复')) {
        const displayText = reply.split('确认下单请回复')[0].replace(/\n+$/, '').trimEnd();
        typing.replaceChildren();
        const textDiv = document.createElement('div');
        textDiv.textContent = displayText;
        typing.appendChild(textDiv);
        const actions = document.createElement('div');
        actions.className = 'confirm-actions';
        const confirmBtn = document.createElement('button');
        confirmBtn.textContent = '✅ 确认';
        confirmBtn.onclick = () => { fill('确认'); send(); };
        const orderBtn = document.createElement('button');
        orderBtn.textContent = '💰 下单';
        orderBtn.onclick = () => { fill('下单'); send(); };
        actions.appendChild(confirmBtn);
        actions.appendChild(orderBtn);
        typing.appendChild(actions);
      } else {
        typing.textContent = reply;
      }
    }
    // 快捷菜单场景推断仍用真实 reply（确保快捷按钮推荐不受显示替换影响）
    renderQuickMenu({userText: text, botText: reply});
    if (data.order_id) {
      addMsg('✅ 已生成订单 #' + data.order_id, 'sys');
    }
    refreshUser();
    refreshOrders();
  } catch (e) {
    typing.textContent = '⚠️ 网络错误：' + e.message;
    typing.classList.add('sys');
    // 出错也要关灯并退出思考态
    _lampsThinking = false;
    _clearAllLamps();
    renderQuickMenu({userText: text, botText: e.message, stage: 'issue'});
  } finally {
    $('sendBtn').disabled = false;
  }
}

async function refreshUser() {
  try {
    const r = await fetch('/user/' + USER_ID);
    const d = await r.json();
    $('userName').textContent = '👋 ' + (d.nickname || '顾客');
    $('userBalance').textContent = '¥' + Number(d.balance).toFixed(2);
    $('userPref').textContent = d.taste_preference || '无';
  } catch(e) {}
}

async function refreshOrders() {
  try {
    const r = await fetch('/orders/' + USER_ID);
    const data = await r.json();
    const orders = Array.isArray(data) ? data : [];
    const list = $('orderList');
    list.replaceChildren();
    if (!orders.length) {
      const emptyTip = document.createElement('div');
      emptyTip.id = 'emptyTip';
      emptyTip.textContent = '还没有订单，聊起来吧~';
      list.appendChild(emptyTip);
      return;
    }
    const fragment = document.createDocumentFragment();
    orders.forEach(order => {
      const o = order && typeof order === 'object' ? order : {};
      const item = document.createElement('div');
      item.className = 'order-item';
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = '☕ ' + asDisplayText(o.coffee_name, '未知饮品');
      item.appendChild(name);
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `¥${formatMenuPrice(o.amount)} · ${asDisplayText(o.created_at, '—')} · #${asDisplayText(o.order_id, '—')}`;
      item.appendChild(meta);
      fragment.appendChild(item);
    });
    list.appendChild(fragment);
  } catch(e) {}
}

async function refreshMode() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    const tag = $('modeTag');
    if (d.llm_active) { tag.textContent = '🟢 真实LLM'; tag.className = 'llm'; }
    else { tag.textContent = '🟡 降级模式'; tag.className = 'mock'; }

}

// ===== Agent 运行指示灯（WebSocket 实时驱动）=====
// 4 个 Agent(智能体)：店长 / 推荐 / 复盘 / 经验，事件前缀 → 灯 ID 映射
const _AGENT_LAMPS = {
  'agent.manager.': 'lamp-manager',
  'agent.recommender.': 'lamp-recommender',
  'agent.reviewer.': 'lamp-reviewer',
  'agent.experience.': 'lamp-experience',
};
const _lampTimers = {};
// 思考态标志：true=正在等 LLM 响应，灯保持亮；false=响应已返回，灯应熄灭
let _lampsThinking = false;

// 点亮某个 Agent 的灯
function _lightAgent(eventType) {
  _lightAgentLamp(eventType);
}
// 直接按事件类型点亮灯（send() 也调用此函数做即时反馈）
function _lightAgentLamp(eventType) {
  for (const prefix in _AGENT_LAMPS) {
    if (eventType.startsWith(prefix)) {
      const lampId = _AGENT_LAMPS[prefix];
      const lamp = document.getElementById(lampId);
      if (!lamp) break;
      lamp.classList.add('active');
      // 思考态：不自动熄灭，等结果出来统一关
      // 非思考态：3 秒后自动熄灭（兜底，比如后台复盘异步事件）
      if (_lampTimers[lampId]) clearTimeout(_lampTimers[lampId]);
      if (!_lampsThinking) {
        _lampTimers[lampId] = setTimeout(() => lamp.classList.remove('active'), 3000);
      }
      break;
    }
  }
}
// 关闭所有 Agent 灯（结果返回后调用）
function _clearAllLamps() {
  for (const lampId of Object.values(_AGENT_LAMPS)) {
    const lamp = document.getElementById(lampId);
    if (lamp) lamp.classList.remove('active');
    if (_lampTimers[lampId]) { clearTimeout(_lampTimers[lampId]); delete _lampTimers[lampId]; }
  }
}

// 连接 /ws/visualization，监听 agent.* 事件
// 增强版：指数退避重连 + 心跳保活 + 连接状态指示
let _wsBackoff = 2000;
let _wsHeartbeatTimer = null;

function _connectAgentWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = proto + '//' + location.host + '/ws/visualization';
  try {
    const ws = new WebSocket(wsUrl);
    ws.onopen = function() {
      _wsBackoff = 2000; // 重置退避
      // 心跳保活：每 15 秒发送 ping
      if (_wsHeartbeatTimer) clearInterval(_wsHeartbeatTimer);
      _wsHeartbeatTimer = setInterval(function() {
        if (ws.readyState === WebSocket.OPEN) {
          try { ws.send(JSON.stringify({type:'ping'})); } catch(e) {}
        }
      }, 15000);
    };
    ws.onmessage = function(evt) {
      try {
        const data = JSON.parse(evt.data);
        // 只关心 agent.* 事件（过滤掉 scene.snapshot / restaurant.* 等）
        if (data.type && data.type.startsWith('agent.')) {
          _lightAgent(data.type);
        }
      } catch(e) {}
    };
    ws.onclose = function(event) {
      if (_wsHeartbeatTimer) { clearInterval(_wsHeartbeatTimer); _wsHeartbeatTimer = null; }
      // 干净关闭（code 1000）不重连，其他断线指数退避重连
      if (event.code !== 1000) {
        setTimeout(_connectAgentWS, _wsBackoff);
        _wsBackoff = Math.min(30000, _wsBackoff * 2);
      }
    };
    ws.onerror = function() { try { ws.close(); } catch(e) {} };
  } catch(e) {
    setTimeout(_connectAgentWS, _wsBackoff);
    _wsBackoff = Math.min(30000, _wsBackoff * 2);
  }
}

  message.style.fontSize = '18px';

  const loginLink = document.createElement('a');
  loginLink.href = '/3d/login';

  loginLink.textContent = '去登录';

// 通过 /auth/me 获取当前登录用户，成功后初始化聊天页
async function initAuth() {
  try {
    const r = await fetch('/auth/me', {credentials: 'include'});
    if (!r.ok) { showLoginPrompt(); return false; }
    const data = await r.json();
    USER_ID = data.user_id;
    return true;
  } catch(e) {
    showLoginPrompt();
    return false;
  }
}
