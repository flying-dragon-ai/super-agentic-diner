<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能咖啡馆 · AI 店长</title>
<link rel="stylesheet" href="/static/order-visualization.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #2b2118;
    color: #f5ebe0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: linear-gradient(135deg, #6f4e37, #4a3429);
    padding: 14px 24px;
    box-shadow: 0 2px 10px rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header h1 span { margin-right: 8px; }
  #modeTag {
    font-size: 12px; padding: 4px 10px; border-radius: 12px;
    background: rgba(255,255,255,.15);
  }
  #modeTag.llm { background: #4caf50; }
  #modeTag.mock { background: #ff9800; }

  main {
    flex: 1; display: flex; overflow: hidden;
  }
  /* 聊天区 */
  #chat {
    flex: 1; display: flex; flex-direction: column; min-width: 0;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
  }
  .msg {
    max-width: 75%; margin-bottom: 14px; padding: 12px 16px;
    border-radius: 16px; line-height: 1.6; white-space: pre-wrap;
    word-break: break-word; animation: fade .25s ease;
  }
  @keyframes fade { from{opacity:0; transform: translateY(8px);} to{opacity:1;} }
  .msg.bot {
    background: #3d2f24; align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    background: #c08552; color: #1a120b; align-self: flex-end; margin-left: auto;
    border-bottom-right-radius: 4px;
  }
  .msg.sys { background: rgba(255,152,0,.15); border:1px solid #ff9800; font-size:13px; }

  #quick {
    display: flex; gap: 8px; padding: 8px 20px; flex-wrap: wrap; flex-shrink: 0;
  }
  #quick button {
    background: #4a3429; color: #e8d5b7; border: 1px solid #6f4e37;
    padding: 6px 12px; border-radius: 16px; font-size: 12px; cursor: pointer;
    transition: all .15s;
  }
  #quick button:hover { background: #6f4e37; }

  #inputBar {
    display: flex; gap: 10px; padding: 16px 20px; background: #221a13; flex-shrink: 0;
  }
  #msgInput {
    flex: 1; background: #3d2f24; color: #f5ebe0; border: 1px solid #6f4e37;
    border-radius: 12px; padding: 12px 16px; font-size: 14px; outline: none;
  }
  #msgInput:focus { border-color: #c08552; }
  #sendBtn {
    background: #c08552; color: #1a120b; border: none; border-radius: 12px;
    padding: 0 24px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background .15s;
  }
  #sendBtn:hover { background: #d49a66; }
  #sendBtn:disabled { opacity: .5; cursor: not-allowed; }

  /* 侧栏 */
  #side {
    width: 300px; background: #221a13; padding: 20px; overflow-y: auto;
    border-left: 1px solid #3d2f24; flex-shrink: 0;
  }
  #side h3 {
    font-size: 13px; color: #c08552; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid #3d2f24;
  }
  .card {
    background: #3d2f24; border-radius: 12px; padding: 14px; margin-bottom: 16px;
  }
  .card .row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 14px; }
  .card .row .val { color: #e8d5b7; font-weight: 600; }
  .card .big { font-size: 26px; color: #d49a66; font-weight: 700; margin: 8px 0; }
  .order-item {
    background: #4a3429; border-radius: 8px; padding: 8px 10px; margin: 6px 0;
    font-size: 13px;
  }
  .order-item .name { color: #e8d5b7; }
  .order-item .meta { color: #8a7a6a; font-size: 11px; }
  #emptyTip { color: #6a5a4a; font-size: 13px; text-align: center; padding: 16px 0; }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #4a3429; border-radius: 3px; }
  .typing { color: #8a7a6a; font-style: italic; }
</style>
</head>
<body>
<header>
  <h1><span>☕</span>智能咖啡馆 · AI 店长</h1>
  <span id="modeTag">加载中…</span>
</header>
<main>
  <div id="chat">
    <div id="messages"></div>
    <div id="quick">
      <button onclick="fill('店长，我想喝点清甜水果味的，但不要加牛奶，推荐一下。')">🍓 求推荐果味</button>
      <button onclick="fill('有没有椰子味的？不要太苦。')">🥥 椰子味</button>
      <button onclick="fill('就买你刚才推荐的那杯，从我余额里扣钱吧。')">💳 下单扣款</button>
      <button onclick="fill('我想来点纯粹苦味的，不要拿铁。')">☕ 纯苦味</button>
      <button onclick="clearChat()" style="margin-left:auto">🗑 清空对话</button>
    </div>
    <div id="inputBar">
      <input id="msgInput" placeholder="和店长说点什么…" onkeydown="if(event.key==='Enter')send()" />
      <button id="sendBtn" onclick="send()">发送</button>
    </div>
  </div>
  <aside id="side">
    <section id="orderViz" aria-label="A2A 点单过程可视化">
      <h3>🎮 A2A 点单过程</h3>
      <div class="viz-card">
        <div class="viz-head">
          <div class="viz-title">咖啡馆动线</div>
          <div class="viz-status" id="orderVizStatus">idle</div>
        </div>
        <div class="viz-canvas-wrap">
          <canvas id="orderGameCanvas" width="640" height="360"></canvas>
        </div>
        <div class="viz-caption" id="orderVizCaption">等待顾客发送消息</div>
        <div class="viz-agents" id="orderVizAgents"></div>
        <div class="viz-flow" id="orderVizFlow" aria-hidden="true"></div>
        <div class="viz-events" id="orderVizEvents"></div>
      </div>
    </section>
    <h3>👤 用户信息</h3>
    <div class="card" id="userCard">
      <div id="userName">加载中…</div>
      <div class="big" id="userBalance">¥--</div>
      <div class="row"><span>口味偏好</span><span class="val" id="userPref">--</span></div>
    </div>
    <h3>🧾 最近订单</h3>
    <div id="orderList"><div id="emptyTip">还没有订单，聊起来吧~</div></div>
  </aside>
</main>

<script src="/static/order-visualization.js"></script>
<script>
const USER_ID = 1;
const $ = id => document.getElementById(id);
const orderViz = () => window.OrderVisualization;

function addMsg(text, role) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  $('messages').appendChild(el);
  $('messages').scrollTop = $('messages').scrollHeight;
  return el;
}

function fill(text){ $('msgInput').value = text; $('msgInput').focus(); }

async function send() {
  const text = $('msgInput').value.trim();
  if (!text) return;
  $('msgInput').value = '';
  addMsg(text, 'user');
  orderViz()?.emit('message:sent', {message: text});
  const typing = addMsg('店长正在思考…', 'bot');
  typing.classList.add('typing');
  $('sendBtn').disabled = true;
  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_id: USER_ID, message: text})
    });
    const data = await r.json();
    if (!r.ok) {
      throw new Error(data.detail || data.message || '请求失败');
    }
    typing.classList.remove('typing');
    typing.textContent = data.reply;
    if (!orderViz()?.isRealtimeConnected()) {
      orderViz()?.handleChatResult(data);
    }
    if (data.order_id) {
      addMsg('✅ 已生成订单 #' + data.order_id, 'sys');
    }
    refreshUser();
    refreshOrders();
  } catch (e) {
    typing.textContent = '⚠️ 网络错误：' + e.message;
    typing.classList.add('sys');
    orderViz()?.emit('order:failed', {error: e.message});
  } finally {
    $('sendBtn').disabled = false;
  }
}

async function clearChat() {
  await fetch('/history/' + USER_ID, {method: 'DELETE'});
  $('messages').innerHTML = '';
  orderViz()?.reset();
  addMsg('对话已清空，我们重新开始吧~ 您想喝点什么？', 'bot');
}

async function refreshUser() {
  try {
    const r = await fetch('/user/' + USER_ID);
    const d = await r.json();
    $('userName').textContent = '👋 ' + (d.nickname || '顾客');
    $('userBalance').textContent = '¥' + Number(d.balance).toFixed(2);
    $('userPref').textContent = d.taste_preference || '无';
  } catch(e) {}
}

async function refreshOrders() {
  try {
    const r = await fetch('/orders/' + USER_ID);
    const orders = await r.json();
    const list = $('orderList');
    if (!orders.length) {
      list.innerHTML = '<div id="emptyTip">还没有订单，聊起来吧~</div>';
      return;
    }
    list.innerHTML = orders.map(o =>
      '<div class="order-item"><div class="name">☕ ' + o.coffee_name +
      '</div><div class="meta">¥' + Number(o.amount).toFixed(2) +
      ' · ' + o.created_at + ' · #' + o.order_id + '</div></div>'
    ).join('');
  } catch(e) {}
}

async function refreshMode() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    const tag = $('modeTag');
    if (d.llm_active) { tag.textContent = '🟢 真实LLM'; tag.className = 'llm'; }
    else { tag.textContent = '🟡 降级模式'; tag.className = 'mock'; }
  } catch(e) {}
}

// 初始化
(async function init() {
  addMsg('您好！我是咖啡馆 AI 店长 ☕\n\n告诉我您喜欢的口味，或者有什么忌口，我来为您推荐~\n（试试右侧的快捷按钮）', 'bot');
  await Promise.all([refreshUser(), refreshOrders(), refreshMode()]);
})();
</script>
</body>
</html>
