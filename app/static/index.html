<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能咖啡馆 · AI 店长</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #2b2118;
    color: #f5ebe0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: linear-gradient(135deg, #6f4e37, #4a3429);
    padding: 14px 24px;
    box-shadow: 0 2px 10px rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header h1 span { margin-right: 8px; }
  #modeTag {
    font-size: 12px; padding: 4px 10px; border-radius: 12px;
    background: rgba(255,255,255,.15);
  }
  #modeTag.llm { background: #4caf50; }
  #modeTag.mock { background: #ff9800; }
  /* 右上角状态栏(按钮 + LLM(大模型) 标签)成组靠右 */
  #headRight {
    display: flex; gap: 10px; align-items: center;
  }
  /* 跳转 3D 咖啡厅的按钮 */
  #view3dBtn {
    font-size: 12px; padding: 5px 12px; border-radius: 12px; cursor: pointer;
    background: #c08552; color: #1a120b; border: 1px solid #d49a66;
    font-weight: 600; transition: background .15s;
  }
  #view3dBtn:hover { background: #d49a66; }

  main {
    flex: 1; display: flex; overflow: hidden;
  }
  /* 聊天区 */
  #chat {
    flex: 1; display: flex; flex-direction: column; min-width: 0;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
  }
  .msg {
    max-width: 75%; margin-bottom: 14px; padding: 12px 16px;
    border-radius: 16px; line-height: 1.6; white-space: pre-wrap;
    word-break: break-word; animation: fade .25s ease;
  }
  @keyframes fade { from{opacity:0; transform: translateY(8px);} to{opacity:1;} }
  .msg.bot {
    background: #3d2f24; align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    background: #c08552; color: #1a120b; align-self: flex-end; margin-left: auto;
    border-bottom-right-radius: 4px;
  }
  .msg.sys { background: rgba(255,152,0,.15); border:1px solid #ff9800; font-size:13px; }

  #quick {
    display: flex; gap: 8px; padding: 8px 20px; flex-wrap: wrap; flex-shrink: 0;
    align-items: center;
  }
  #quickMenu {
    display: flex; gap: 8px; flex-wrap: wrap; min-width: 0;
  }
  #quick button {
    background: #4a3429; color: #e8d5b7; border: 1px solid #6f4e37;
    padding: 6px 12px; border-radius: 16px; font-size: 12px; cursor: pointer;
    transition: all .15s;
    min-height: 30px;
    max-width: 150px;
    overflow-wrap: anywhere;
  }
  #quick button.intent-active {
    background: #6f4e37; border-color: #c08552; color: #fff3df;
  }
  #quick .quick-clear {
    margin-left: auto;
    flex: 0 0 auto;
  }
  #quick button:hover { background: #6f4e37; }

  #inputBar {
    display: flex; gap: 10px; padding: 16px 20px; background: #221a13; flex-shrink: 0;
  }
  #consumerUrlBar {
    display: flex; gap: 10px; padding: 10px 20px 0; background: #221a13; flex-shrink: 0;
  }
  #consumerUrlInput {
    flex: 1; background: #2d231b; color: #e8d5b7; border: 1px solid #4a3429;
    border-radius: 10px; padding: 9px 12px; font-size: 12px; outline: none;
  }
  #consumerUrlInput:focus { border-color: #c08552; }
  #msgInput {
    flex: 1; background: #3d2f24; color: #f5ebe0; border: 1px solid #6f4e37;
    border-radius: 12px; padding: 12px 16px; font-size: 14px; outline: none;
  }
  #msgInput:focus { border-color: #c08552; }
  #sendBtn {
    background: #c08552; color: #1a120b; border: none; border-radius: 12px;
    padding: 0 24px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background .15s;
  }
  #sendBtn:hover { background: #d49a66; }
  #sendBtn:disabled { opacity: .5; cursor: not-allowed; }

  /* 侧栏 */
  #side {
    width: min(46vw, 520px); min-width: 420px; background: #221a13; padding: 20px; overflow-y: auto;
    border-left: 1px solid #3d2f24; flex-shrink: 0;
  }
  #side h3 {
    font-size: 13px; color: #c08552; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid #3d2f24;
  }
  .card {
    background: #3d2f24; border-radius: 12px; padding: 14px; margin-bottom: 16px;
  }
  .card .row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 14px; }
  .card .row .val { color: #e8d5b7; font-weight: 600; }
  .card .big { font-size: 26px; color: #d49a66; font-weight: 700; margin: 8px 0; }
  .order-item {
    background: #4a3429; border-radius: 8px; padding: 8px 10px; margin: 6px 0;
    font-size: 13px;
  }
  .order-item .name { color: #e8d5b7; }
  .order-item .meta { color: #8a7a6a; font-size: 11px; }
  #emptyTip { color: #6a5a4a; font-size: 13px; text-align: center; padding: 16px 0; }

  @media (max-width: 920px) {
    main { flex-direction: column; }
    #side {
      width: 100%;
      min-width: 0;
      border-left: none;
      border-top: 1px solid #3d2f24;
    }
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #4a3429; border-radius: 3px; }
  .typing { color: #8a7a6a; font-style: italic; }

  /* 菜单图片卡片（水平滚动） */
  .menu-cards {
    display: flex; gap: 14px; overflow-x: auto; padding: 12px 4px;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  }
  .menu-cards::-webkit-scrollbar { height: 5px; }
  .menu-cards::-webkit-scrollbar-thumb { background: #6f4e37; border-radius: 3px; }
  .menu-card {
    flex: 0 0 160px; scroll-snap-align: start;
    background: linear-gradient(135deg, #4a3429, #3d2f24);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    border: 1px solid rgba(192,133,82,.25);
    transition: transform .18s, border-color .18s;
  }
  .menu-card:hover {
    transform: translateY(-4px);
    border-color: #c08552;
  }
  .menu-card img {
    width: 100%; height: 120px; object-fit: cover;
    display: block; background: #2b2118;
  }
  .menu-card-body {
    padding: 10px 12px 12px;
  }
  .menu-card-name {
    font-size: 14px; font-weight: 600; color: #f5ebe0;
    margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .menu-card-price {
    font-size: 16px; font-weight: 700; color: #d49a66;
  }
  .menu-card-price::before { content: '¥'; font-size: 12px; margin-right: 1px; }
  .menu-card-tags {
    font-size: 11px; color: #8a7a6a; margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .menu-card-btn {
    display: block; width: 100%; margin-top: 8px;
    padding: 6px 0; border-radius: 8px; border: none;
    background: #c08552; color: #1a120b; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .menu-card-btn:hover { background: #d49a66; }

  /* 待确认订单的操作按钮（确认 / 下单） */
  .confirm-actions {
    margin-top: 12px;
    display: flex;
    gap: 10px;
  }
  .confirm-actions button {
    padding: 8px 22px;
    border-radius: 10px;
    border: none;
    background: #c08552;
    color: #1a120b;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .confirm-actions button:hover { background: #d49a66; }
</style>
</head>
<body>
<header>
  <h1><span>☕</span>智能咖啡馆 · AI 店长</h1>
  <div id="headRight">
    <!-- 点击新开标签页打开 3D 咖啡厅场景(/3d) -->
    <button id="view3dBtn" onclick="window.open('/3d','_blank')">🌐 3D 咖啡厅</button>
    <!-- 登出后回到登录页 -->
    <button id="logoutBtn" onclick="doLogout()" style="font-size:12px;padding:5px 12px;border-radius:12px;cursor:pointer;background:#4a3429;color:#e8d5b7;border:1px solid #6f4e37;font-weight:600;transition:background .15s;">🚪 登出</button>
    <span id="modeTag">加载中…</span>
  </div>
</header>
<main>
  <div id="chat">
    <div id="messages"></div>
    <div id="quick">
      <div id="quickMenu" aria-label="意图快捷菜单"></div>
      <button class="quick-clear" onclick="clearChat()">🗑 清空对话</button>
    </div>
    <div id="consumerUrlBar">
      <input id="consumerUrlInput" placeholder="Order page URL" />
    </div>
    <div id="inputBar">
      <input id="msgInput" placeholder="和店长说点什么…" onkeydown="if(event.key==='Enter')send()" />
      <button id="sendBtn" onclick="send()">发送</button>
    </div>
  </div>
  <aside id="side">
    <h3>👤 用户信息</h3>
    <div class="card" id="userCard">
      <div id="userName">加载中…</div>
      <div class="big" id="userBalance">¥--</div>
      <div class="row"><span>口味偏好</span><span class="val" id="userPref">--</span></div>
    </div>
    <h3>🧾 最近订单</h3>
    <div id="orderList"><div id="emptyTip">还没有订单，聊起来吧~</div></div>
  </aside>
</main>

<script>
// USER_ID 由 /auth/me 动态获取，未登录时为 null（页面显示登录引导）
let USER_ID = null;
const $ = id => document.getElementById(id);
const quickState = {
  lastUserText: '',
  lastBotText: '',
  selectedKey: '',
  scene: 'welcome',
};

const quickPresets = {
  welcome: [
    {key: 'fruit', label: '🍓 果香推荐', prompt: '店长，我想喝点清甜水果味的，但不要加牛奶，推荐一下。'},
    {key: 'coconut', label: '🥥 椰香少苦', prompt: '有没有椰子味的？不要太苦。'},
    {key: 'menu', label: '📋 看看菜单', prompt: '店长，今天有什么适合新手的咖啡？'},
    {key: 'bitter', label: '☕ 纯苦风味', prompt: '我想来点纯粹苦味的，不要拿铁。'},
  ],
  fruit: [
    {key: 'fruit-milkless', label: '🍓 果香无奶', prompt: '我想要清爽水果香，不加牛奶，帮我推荐一杯。'},
    {key: 'cold-brew', label: '🧊 冷萃清爽', prompt: '有没有适合冰着喝的清爽冷萃？'},
    {key: 'less-bitter', label: '🍯 少苦一点', prompt: '可以推荐不太苦、入口更清甜的咖啡吗？'},
    {key: 'order-reco', label: '✅ 选推荐款', prompt: '就买你刚才推荐的那杯，从我余额里扣钱吧。'},
  ],
  coconut: [
    {key: 'coconut-soft', label: '🥥 椰香柔和', prompt: '我想喝椰子味明显、不要太苦的咖啡。'},
    {key: 'coconut-ice', label: '🧊 冰椰拿铁', prompt: '有没有冰的椰香拿铁或类似口味？'},
    {key: 'sweet', label: '🍮 甜感更足', prompt: '想要甜感更明显一点，不要酸苦太重。'},
    {key: 'order-reco', label: '✅ 选这杯', prompt: '就买你刚才推荐的那杯，从我余额里扣钱吧。'},
  ],
  bitter: [
    {key: 'black', label: '☕ 黑咖啡', prompt: '我想要纯粹咖啡苦香，不要奶味，推荐一杯。'},
    {key: 'deep', label: '🫘 深烘风味', prompt: '有没有深烘、坚果或可可调性的咖啡？'},
    {key: 'no-latte', label: '🚫 不要拿铁', prompt: '不要拿铁和奶咖，想喝更直接的咖啡味。'},
    {key: 'order-reco', label: '💳 直接下单', prompt: '就买你刚才推荐的那杯，从我余额里扣钱吧。'},
  ],
  ordering: [
    {key: 'confirm', label: '✅ 确认下单', prompt: '确认下单。'},
    {key: 'balance', label: '💰 看余额', prompt: '先帮我确认余额够不够。'},
    {key: 'change', label: '🔁 换一杯', prompt: '我想换一杯，重新推荐一下。'},
    {key: 'pickup', label: '🧾 看订单', prompt: '帮我看看最近订单。'},
  ],
  confirming: [
    {key: 'confirm', label: '✅ 确认', prompt: '确认。'},
    {key: 'less-sweet', label: '半糖', prompt: '如果可以的话，甜度帮我调低一点再下单。'},
    {key: 'cancel', label: '先等等', prompt: '先等等，我再想一下。'},
    {key: 'change', label: '换口味', prompt: '换个口味，重新推荐。'},
  ],
  paid: [
    {key: 'again', label: '再来一杯', prompt: '我还想再点一杯，推荐一个不同口味。'},
    {key: 'orders', label: '查看订单', prompt: '帮我看看最近订单。'},
    {key: 'review', label: '评价口味', prompt: '这杯如果偏苦，下次帮我推荐更清甜的。'},
    {key: 'dessert', label: '搭配建议', prompt: '这杯适合搭配什么甜点或小食？'},
  ],
  waiting: [
    {key: 'thinking', label: '稍等', prompt: '好的，我等你推荐。'},
    {key: 'fruit', label: '果香', prompt: '优先考虑果香清爽的。'},
    {key: 'hot', label: '热饮', prompt: '如果可以，推荐热饮。'},
    {key: 'ice', label: '冰饮', prompt: '如果可以，推荐冰饮。'},
  ],
  issue: [
    {key: 'retry', label: '重试发送', prompt: '请再试一次，帮我继续处理这杯咖啡。'},
    {key: 'menu', label: '回到菜单', prompt: '先回到菜单，重新推荐一杯。'},
    {key: 'manual', label: '人工点单', prompt: '如果系统繁忙，请按常规菜单帮我点单。'},
    {key: 'clear', label: '重新开始', prompt: '我们重新开始，我想喝一杯咖啡。'},
  ],
};

function containsAny(text, words) {
  return words.some(word => text.includes(word));
}

function normalizeText(text) {
  return String(text || '').toLowerCase();
}

function extractCoffeeName(text) {
  const source = String(text || '');
  const quoted = source.match(/[「『]([^」』]{2,16})[」』]/);
  if (quoted) return quoted[1].replace(/[，。,.].*$/, '').slice(0, 8);
  const named = source.match(/([\u4e00-\u9fa5]{2,8}(拿铁|冷萃|美式|摩卡|咖啡|澳白|卡布))/);
  return named ? named[1].slice(0, 8) : '';
}

function inferQuickScene(userText, botText, stage) {
  const user = normalizeText(userText);
  const bot = normalizeText(botText);
  const joined = user + ' ' + bot;
  if (stage === 'issue') return 'issue';
  if (stage === 'sending') return 'waiting';
  if (containsAny(bot, ['已生成订单', '已为您下单', '扣款', '订单 #', '订单#'])) return 'paid';
  if (containsAny(bot, ['确认下单', '回复「确认」', '回复“确认”', '待确认'])) return 'confirming';
  if (containsAny(user, ['确认', '下单', '买', '扣钱', '扣款', '结账', '支付'])) return 'ordering';
  if (containsAny(joined, ['椰子', '椰香', '椰'])) return 'coconut';
  if (containsAny(joined, ['果味', '水果', '果香', '清甜', '酸甜', '不要牛奶', '无奶'])) return 'fruit';
  if (containsAny(joined, ['苦', '黑咖啡', '深烘', '美式', '不要拿铁', '纯粹'])) return 'bitter';
  if (containsAny(joined, ['推荐', '菜单', '喝点', '口味', '忌口', '适合'])) return 'welcome';
  return quickState.scene || 'welcome';
}

function tuneActionsForContext(actions, userText, botText) {
  const coffeeName = extractCoffeeName(botText);
  const user = normalizeText(userText);
  const tuned = actions.map(action => ({...action}));
  if (coffeeName) {
    const labelName = coffeeName.length > 5 ? coffeeName.slice(0, 5) : coffeeName;
    const orderIndex = tuned.findIndex(action => action.key === 'order-reco' || action.key === 'confirm');
    if (orderIndex >= 0) {
      tuned[orderIndex] = {
        ...tuned[orderIndex],
        label: '✅ 买' + labelName,
        prompt: '就买「' + coffeeName + '」，从我余额里扣钱吧。',
      };
    }
  }
  if (containsAny(user, ['冰', '冷'])) {
    tuned[1] = {key: 'ice-focus', label: '🧊 冰饮优先', prompt: '优先推荐冰饮，口感清爽一点。'};
  } else if (containsAny(user, ['热', '暖'])) {
    tuned[1] = {key: 'hot-focus', label: '♨️ 热饮优先', prompt: '优先推荐热饮，适合慢慢喝。'};
  }
  if (containsAny(user, ['不要牛奶', '无奶', '不加奶'])) {
    tuned[0] = {key: 'milkless', label: '无奶', prompt: '请按不加牛奶的方向推荐。'};
  }
  return tuned.slice(0, 4);
}

function renderQuickMenu(options) {
  const opts = options || {};
  if (opts.userText !== undefined) quickState.lastUserText = opts.userText;
  if (opts.botText !== undefined) quickState.lastBotText = opts.botText;
  const scene = opts.scene || inferQuickScene(quickState.lastUserText, quickState.lastBotText, opts.stage);
  quickState.scene = scene;
  const menu = $('quickMenu');
  if (!menu) return;
  const base = quickPresets[scene] || quickPresets.welcome;
  const actions = tuneActionsForContext(base, quickState.lastUserText, quickState.lastBotText);
  menu.innerHTML = '';
  actions.forEach(action => {
    const button = document.createElement('button');
    button.type = 'button';
    button.textContent = action.label;
    button.title = action.prompt;
    button.dataset.intent = action.key;
    if (action.key === quickState.selectedKey) button.classList.add('intent-active');
    button.addEventListener('click', () => {
      quickState.selectedKey = action.key;
      fill(action.prompt);
    });
    menu.appendChild(button);
  });
}

function addMsg(text, role) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  $('messages').appendChild(el);
  $('messages').scrollTop = $('messages').scrollHeight;
  return el;
}

// ===== 菜单图片卡片 =====
let _menuCache = null;

async function fetchMenu() {
  if (_menuCache) return _menuCache;
  try {
    const r = await fetch('/menu', {credentials: 'include'});
    if (!r.ok) return [];
    _menuCache = await r.json();
    return _menuCache;
  } catch(e) { return []; }
}

function renderMenuCards(menuItems) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg bot';
  wrapper.style.cssText = 'max-width:100%;padding:4px 0;background:transparent;border:none;';
  const title = document.createElement('div');
  title.style.cssText = 'font-size:13px;color:#8a7a6a;margin-bottom:8px;padding-left:4px;';
  title.textContent = '以下是我们的全部咖啡，左右滑动浏览：';
  wrapper.appendChild(title);
  const cards = document.createElement('div');
  cards.className = 'menu-cards';
  menuItems.forEach(item => {
    const card = document.createElement('div');
    card.className = 'menu-card';
    const tagsShort = (item.tags || '').split(',').slice(0, 3).join(' ');
    card.innerHTML =
      `<img src="${item.image}" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">` +
      `<div class="menu-card-body">` +
        `<div class="menu-card-name">${item.name}</div>` +
        `<div class="menu-card-price">${item.price.toFixed(2)}</div>` +
        `<div class="menu-card-tags">${tagsShort}</div>` +
        `<button class="menu-card-btn" onclick="orderCoffee('${item.name}')">点这杯</button>` +
      `</div>`;
    cards.appendChild(card);
  });
  wrapper.appendChild(cards);
  $('messages').appendChild(wrapper);
  $('messages').scrollTop = $('messages').scrollHeight;
}

function isMenuRequest(text) {
  const t = (text || '').toLowerCase();
  const keywords = ['菜单', 'menu', '都有什么', '有什么', '都有什么咖啡',
                     '全部咖啡', '所有咖啡', '看看菜单', '今天有什么',
                     '列出', '看看有什么'];
  return keywords.some(k => t.includes(k));
}

function fill(text){
  $('msgInput').value = text;
  $('msgInput').focus();
  renderQuickMenu({userText: text});
}

// 卡片"点这杯"按钮：填充消息后自动发送下单请求
function orderCoffee(name) {
  fill('我要一杯' + name);
  send();
}

async function send() {
  if (USER_ID === null) { showLoginPrompt(); return; }
  const text = $('msgInput').value.trim();
  if (!text) return;
  $('msgInput').value = '';
  renderQuickMenu({userText: text, stage: 'sending'});
  addMsg(text, 'user');
  const typing = addMsg('店长正在思考…', 'bot');
  typing.classList.add('typing');
  $('sendBtn').disabled = true;
  try {
    const consumerUrl = $('consumerUrlInput')?.value.trim() || window.location.href;
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user_id: USER_ID, message: text, consumer_url: consumerUrl})
    });
    // 先检查响应是否正常，再安全解析 JSON（防止 500 返回纯文本导致 JSON.parse 崩溃）
    if (!r.ok) {
      let errMsg = '请求失败 (' + r.status + ')';
      try {
        const errData = await r.json();
        errMsg = errData.detail || errData.message || errMsg;
      } catch(_) {}
      throw new Error(errMsg);
    }
    const data = await r.json();
    typing.classList.remove('typing');
    const menuRequest = isMenuRequest(text);
    // 优先使用后端返回的结构化产品数据渲染卡片（推荐/菜单场景均覆盖）
    if (data.products && data.products.length > 0) {
      typing.textContent = '为您找到以下咖啡，点击可直接下单：';
      renderMenuCards(data.products);
    } else if (menuRequest) {
      // 兜底：后端未返回 products 时，前端自行拉取全量菜单
      typing.textContent = '以下是我们的全部咖啡，左右滑动浏览：';
      const menu = await fetchMenu();
      if (menu && menu.length) renderMenuCards(menu);
    } else {
      // 待确认订单：截掉「确认下单请回复…」提示语，改为按钮
      if (data.reply.includes('确认下单请回复')) {
        const displayText = data.reply.split('确认下单请回复')[0].replace(/\n+$/, '').trimEnd();
        typing.innerHTML = '';
        const textDiv = document.createElement('div');
        textDiv.textContent = displayText;
        typing.appendChild(textDiv);
        const actions = document.createElement('div');
        actions.className = 'confirm-actions';
        const confirmBtn = document.createElement('button');
        confirmBtn.textContent = '✅ 确认';
        confirmBtn.onclick = () => { fill('确认'); send(); };
        const orderBtn = document.createElement('button');
        orderBtn.textContent = '💰 下单';
        orderBtn.onclick = () => { fill('下单'); send(); };
        actions.appendChild(confirmBtn);
        actions.appendChild(orderBtn);
        typing.appendChild(actions);
      } else {
        typing.textContent = data.reply;
      }
    }
    // 快捷菜单场景推断仍用真实 reply（确保快捷按钮推荐不受显示替换影响）
    renderQuickMenu({userText: text, botText: data.reply});
    if (data.order_id) {
      addMsg('✅ 已生成订单 #' + data.order_id, 'sys');
    }
    refreshUser();
    refreshOrders();
  } catch (e) {
    typing.textContent = '⚠️ 网络错误：' + e.message;
    typing.classList.add('sys');
    renderQuickMenu({userText: text, botText: e.message, stage: 'issue'});
  } finally {
    $('sendBtn').disabled = false;
  }
}

async function clearChat() {
  // 先重置本地 UI 和菜单，确保即使后端不可用菜单也回到欢迎态
  $('messages').innerHTML = '';
  quickState.lastUserText = '';
  quickState.lastBotText = '';
  quickState.selectedKey = '';
  renderQuickMenu({scene: 'welcome', userText: '', botText: ''});
  addMsg('对话已清空，我们重新开始吧~ 您想喝点什么？', 'bot');
  try {
    await fetch('/history/' + USER_ID, {method: 'DELETE'});
  } catch (e) {
    // 后端清空失败不阻塞本地重置
  }
}

// 登出：清除 cookie 后跳转登录页
async function doLogout() {
  try {
    await fetch('/auth/logout', {method: 'POST', credentials: 'include'});
  } catch(e) {}
  window.location.href = '/3d/login';
}

async function refreshUser() {
  try {
    const r = await fetch('/user/' + USER_ID);
    const d = await r.json();
    $('userName').textContent = '👋 ' + (d.nickname || '顾客');
    $('userBalance').textContent = '¥' + Number(d.balance).toFixed(2);
    $('userPref').textContent = d.taste_preference || '无';
  } catch(e) {}
}

async function refreshOrders() {
  try {
    const r = await fetch('/orders/' + USER_ID);
    const orders = await r.json();
    const list = $('orderList');
    if (!orders.length) {
      list.innerHTML = '<div id="emptyTip">还没有订单，聊起来吧~</div>';
      return;
    }
    list.innerHTML = orders.map(o =>
      '<div class="order-item"><div class="name">☕ ' + o.coffee_name +
      '</div><div class="meta">¥' + Number(o.amount).toFixed(2) +
      ' · ' + o.created_at + ' · #' + o.order_id + '</div></div>'
    ).join('');
  } catch(e) {}
}

async function refreshMode() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    const tag = $('modeTag');
    if (d.llm_active) { tag.textContent = '🟢 真实LLM'; tag.className = 'llm'; }
    else { tag.textContent = '🟡 降级模式'; tag.className = 'mock'; }
  } catch(e) {}
}

// 未登录态：隐藏聊天区，显示登录引导
function showLoginPrompt() {
  const chatBox = $('chat');
  if (!chatBox) return;
  chatBox.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#e8d5b7;gap:16px">' +
      '<div style="font-size:18px">请先登录后再使用 AI 店长服务</div>' +
      '<a href="/3d/login" style="background:#c08552;color:#1a120b;padding:10px 28px;border-radius:10px;text-decoration:none;font-weight:600">去登录</a>' +
    '</div>';
}

// 通过 /auth/me 获取当前登录用户，成功后初始化聊天页
async function initAuth() {
  try {
    const r = await fetch('/auth/me', {credentials: 'include'});
    if (!r.ok) { showLoginPrompt(); return false; }
    const data = await r.json();
    USER_ID = data.user_id;
    return true;
  } catch(e) {
    showLoginPrompt();
    return false;
  }
}

// 初始化
(async function init() {
  if ($('consumerUrlInput')) $('consumerUrlInput').value = window.location.href;
  if ($('msgInput')) {
    $('msgInput').addEventListener('input', () => {
      quickState.selectedKey = '';
      renderQuickMenu({userText: $('msgInput').value});
    });
  }
  renderQuickMenu({scene: 'welcome'});
  const ok = await initAuth();
  if (!ok) return;
  addMsg('您好！我是咖啡馆 AI 店长 ☕\n\n告诉我您喜欢的口味，或者有什么忌口，我来为您推荐~\n（试试右侧的快捷按钮）', 'bot');
  await Promise.all([refreshUser(), refreshOrders(), refreshMode()]);
})();
</script>
