<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商业咨询 · Crossroads Agent Café</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0e17;--card:#111827;--border:rgba(255,255,255,0.08);
    --accent:#22d3ee;--gold:#fbbf24;--green:#34d399;--purple:#a78bfa;
    --text:#e8eef5;--text-dim:#8b9bb4;--text-muted:#5a6a82;
    --bubble-user:#1a3a5c;--bubble-ai:#1e293b;
  }
  body{
    background:var(--bg);color:var(--text);
    font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;
    height:100vh;display:flex;flex-direction:column;overflow:hidden;
  }

  /* ===== Header ===== */
  .header{
    background:linear-gradient(135deg,#0d1520,#111827);
    border-bottom:1px solid var(--border);
    padding:14px 20px;display:flex;align-items:center;gap:14px;
    flex-shrink:0;
  }
  .header .avatar{
    width:42px;height:42px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold),#f59e0b);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;flex-shrink:0;
  }
  .header-info h1{font-size:16px;font-weight:700}
  .header-info .role{
    font-size:11px;color:var(--gold);background:rgba(251,191,36,0.12);
    padding:2px 8px;border-radius:4px;display:inline-block;margin-top:2px;
    border:1px solid rgba(251,191,36,0.2);
  }
  .header-info .status{font-size:12px;color:var(--green);margin-top:3px}
  .header-actions{margin-left:auto;display:flex;gap:8px}
  .header-btn{
    padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;
    border:1px solid var(--border);background:#0d1117;color:var(--text-dim);
    text-decoration:none;transition:all 0.2s;
  }
  .header-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* ===== Chat Area ===== */
  .chat-area{
    flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth;
  }
  .chat-area::-webkit-scrollbar{width:6px}
  .chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

  .msg-row{
    display:flex;gap:12px;margin-bottom:20px;align-items:flex-start;
    animation:fadeIn 0.3s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .msg-row.user{flex-direction:row-reverse}
  .msg-avatar{
    width:36px;height:36px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .msg-row.ai .msg-avatar{
    background:linear-gradient(135deg,var(--gold),#f59e0b);
  }
  .msg-row.user .msg-avatar{
    background:linear-gradient(135deg,var(--accent),#0891b2);
  }
  .msg-content{max-width:70%;display:flex;flex-direction:column}
  .msg-row.user .msg-content{align-items:flex-end}
  .msg-bubble{
    padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.7;
    white-space:pre-wrap;word-break:break-word;
  }
  .msg-row.ai .msg-bubble{
    background:var(--bubble-ai);border:1px solid var(--border);
    border-bottom-left-radius:4px;
  }
  .msg-row.user .msg-bubble{
    background:var(--bubble-user);border-bottom-right-radius:4px;
  }
  .msg-time{font-size:11px;color:var(--text-muted);margin-top:4px;padding:0 4px}

  .typing-indicator{
    display:flex;gap:4px;padding:12px 16px;align-items:center;
    background:var(--bubble-ai);border:1px solid var(--border);
    border-radius:14px;border-bottom-left-radius:4px;width:fit-content;
  }
  .typing-dot{
    width:8px;height:8px;border-radius:50%;background:var(--text-dim);
    animation:typing 1.4s infinite ease-in-out;
  }
  .typing-dot:nth-child(2){animation-delay:0.2s}
  .typing-dot:nth-child(3){animation-delay:0.4s}
  @keyframes typing{
    0%,60%,100%{opacity:0.3;transform:scale(0.8)}
    30%{opacity:1;transform:scale(1.1)}
  }

  /* ===== Welcome Message ===== */
  .welcome-msg{
    text-align:center;padding:40px 20px;color:var(--text-dim);
  }
  .welcome-msg .icon{font-size:48px;margin-bottom:12px}
  .welcome-msg h2{font-size:18px;color:var(--text);margin-bottom:8px}
  .welcome-msg p{font-size:14px;line-height:1.8;max-width:500px;margin:0 auto}
  .welcome-msg .topics{
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px;
  }
  .topic-chip{
    padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;
    border:1px solid var(--border);background:var(--card);color:var(--text-dim);
    transition:all 0.2s;
  }
  .topic-chip:hover{border-color:var(--accent);color:var(--accent)}

  /* ===== Input Area ===== */
  .input-area{
    border-top:1px solid var(--border);background:var(--card);
    padding:14px 20px;flex-shrink:0;
  }
  .input-row{display:flex;gap:10px;align-items:flex-end}
  .input-row textarea{
    flex:1;resize:none;border:1px solid var(--border);background:#0d1117;
    color:var(--text);border-radius:10px;padding:10px 14px;font-size:14px;
    line-height:1.6;max-height:120px;min-height:44px;outline:none;
    font-family:inherit;transition:border-color 0.2s;
  }
  .input-row textarea:focus{border-color:var(--accent)}
  .send-btn{
    padding:10px 24px;border-radius:10px;border:none;cursor:pointer;
    background:var(--accent);color:#0a0e17;font-size:14px;font-weight:600;
    transition:all 0.2s;white-space:nowrap;
  }
  .send-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,211,238,0.3)}
  .send-btn:disabled{opacity:0.5;cursor:not-allowed}

  .input-hint{
    font-size:11px;color:var(--text-muted);margin-top:8px;display:flex;
    justify-content:space-between;align-items:center;
  }
  .clear-btn{
    font-size:11px;cursor:pointer;color:var(--text-muted);
    background:none;border:none;transition:color 0.2s;
  }
  .clear-btn:hover{color:#f87171}

  /* ===== Login Prompt ===== */
  .login-prompt{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;padding:40px;text-align:center;
  }
  .login-prompt .icon{font-size:56px}
  .login-prompt h2{font-size:20px}
  .login-prompt p{color:var(--text-dim);font-size:14px;max-width:400px}
  .login-prompt .btn{
    padding:12px 36px;border-radius:10px;background:var(--accent);
    color:#0a0e17;font-weight:600;font-size:15px;text-decoration:none;
    transition:transform 0.2s;
  }
  .login-prompt .btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="avatar">🎯</div>
  <div class="header-info">
    <h1>首席战略官 · 店长AI</h1>
    <span class="role">CSO · 战略咨询</span>
    <div class="status">● 在线 · 秒回</div>
  </div>
  <div class="header-actions">
    <a href="/3d" class="header-btn">3D 场景</a>
    <a href="/services" class="header-btn">服务市场</a>
    <a href="/welcome" class="header-btn">返回首页</a>
  </div>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
  <!-- Will be populated by JS -->
</div>

<!-- Input Area -->
<div class="input-area" id="inputArea" style="display:none">
  <div class="input-row">
    <textarea id="msgInput" placeholder="输入您的商业问题，如：Agent 经济怎么赚钱？" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
  <div class="input-hint">
    <span>Enter 发送 · Shift+Enter 换行</span>
    <button class="clear-btn" onclick="clearHistory()">清空对话</button>
  </div>
</div>

<!-- Login Prompt (shown if not logged in) -->
<div class="login-prompt" id="loginPrompt" style="display:none">
  <div class="icon">🔒</div>
  <h2>请先登录</h2>
  <p>商业咨询功能需要登录后使用。注册仅需 10 秒，立即体验 Agent 经济的专属战略顾问。</p>
  <a href="/welcome" class="btn">去登录 / 注册</a>
</div>

<script>
let busy = false;

// ===== Init =====
async function init() {
  // Check login status
  try {
    const res = await fetch('/auth/me', {credentials:'include'});
    if (!res.ok) throw new Error('not logged in');
    const data = await res.json();
    // Logged in — show chat
    document.getElementById('inputArea').style.display = 'block';
    await loadHistory();
    if (document.getElementById('chatArea').children.length === 0) {
      showWelcome();
    }
  } catch(e) {
    document.getElementById('loginPrompt').style.display = 'flex';
  }
}

// Show welcome message with suggested topics
function showWelcome() {
  const area = document.getElementById('chatArea');
  area.innerHTML = `
    <div class="welcome-msg">
      <div class="icon">🎯</div>
      <h2>您好！我是 Crossroads Agent Café 的首席战略官</h2>
      <p>我可以为您解答 Agent 经济、A2A 协议、平台合作等商业问题。</p>
      <div style="background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);border-radius:8px;padding:12px 14px;margin:12px 0;font-size:13px;line-height:1.8;">
        <strong style="color:var(--green);">✅ 已上线：</strong>A2A 协议点咖啡 · 3D 咖啡厅 · EvoMap 积分支付<br>
        <strong style="color:var(--accent);">🗺️ 规划中：</strong>Agent 服务市场 · 劳务撞合 · 线下零售
      </div>
      <p style="font-size:13px;color:var(--text-muted);">请选择下方话题，或直接输入您的问题。</p>
      <div class="topics">
        <div class="topic-chip" onclick="quickAsk('Agent 经济的商业模式是什么？')">💡 商业模式</div>
        <div class="topic-chip" onclick="quickAsk('怎么在平台发布 Agent 服务？')">🚀 发布服务</div>
        <div class="topic-chip" onclick="quickAsk('A2A 协议是什么？有什么价值？')">🔗 A2A 协议</div>
        <div class="topic-chip" onclick="quickAsk('企业批量采购怎么结算？')">💰 企业采购</div>
        <div class="topic-chip" onclick="quickAsk('平台有哪些投资合作机会？')">🤝 投资合作</div>
      </div>
    </div>
  `;
}

function quickAsk(q) {
  document.getElementById('msgInput').value = q;
  sendMessage();
}

// ===== Load History =====
async function loadHistory() {
  try {
    const res = await fetch('/api/consult/history', {credentials:'include'});
    const data = await res.json();
    if (data.messages && data.messages.length > 0) {
      const area = document.getElementById('chatArea');
      area.innerHTML = '';
      for (const m of data.messages) {
        appendMessage(m.role, m.content, m.ts);
      }
      scrollToBottom();
    }
  } catch(e) {
    console.error('Failed to load history:', e);
  }
}

// ===== Send Message =====
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const msg = input.value.trim();
  if (!msg || busy) return;

  busy = true;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '...';

  // Clear welcome if present
  const welcome = document.querySelector('.welcome-msg');
  if (welcome) welcome.remove();

  // Show user message
  appendMessage('user', msg);
  input.value = '';
  autoResize(input);

  // Show typing indicator
  const typingId = showTyping();

  try {
    const res = await fetch('/api/consult', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({message: msg}),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '请求失败');

    removeTyping(typingId);
    appendMessage('assistant', data.reply, data.timestamp);
  } catch(e) {
    removeTyping(typingId);
    appendMessage('assistant', '抱歉，服务暂时不可用：' + e.message);
  } finally {
    busy = false;
    btn.disabled = false;
    btn.textContent = '发送';
  }
}

// ===== Helpers =====
function appendMessage(role, content, ts) {
  const area = document.getElementById('chatArea');
  const isUser = role === 'user';
  const avatar = isUser ? '👤' : '🎯';
  const time = ts ? formatTime(ts) : '';

  const row = document.createElement('div');
  row.className = 'msg-row ' + (isUser ? 'user' : 'ai');
  row.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-content">
      <div class="msg-bubble">${escapeHtml(content)}</div>
      ${time ? `<div class="msg-time">${time}</div>` : ''}
    </div>
  `;
  area.appendChild(row);
  scrollToBottom();
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const id = 'typing-' + Date.now();
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = id;
  row.innerHTML = `
    <div class="msg-avatar">🎯</div>
    <div class="msg-content">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  area.appendChild(row);
  scrollToBottom();
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function formatTime(ts) {
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
  } catch { return ''; }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

async function clearHistory() {
  if (!confirm('确定清空所有咨询对话记录吗？')) return;
  try {
    await fetch('/api/consult/history', {method:'DELETE', credentials:'include'});
    document.getElementById('chatArea').innerHTML = '';
    showWelcome();
  } catch(e) {
    alert('清除失败：' + e.message);
  }
}

// ===== Start =====
init();
</script>

</body>
</html>
